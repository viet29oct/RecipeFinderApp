spring:
  application:
    name: recipe-finder-api

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/recipefinder}
    username: ${SPRING_DATASOURCE_USERNAME:NoutSpace}
    password: ${SPRING_DATASOURCE_PASSWORD:123456}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    user: ${SPRING_DATASOURCE_USERNAME:NoutSpace}
    password: ${SPRING_DATASOURCE_PASSWORD:123456}

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /

app:
  api:
    base-path: /api/v1

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:8081,http://localhost:19006}

  jwt:
    secret: ${JWT_SECRET:change-me-to-a-256-bit-secret-key-in-production-env}
    access-expiration-ms: ${JWT_ACCESS_EXPIRATION_MS:900000}
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}
    issuer: recipe-finder-api

springdoc:
  api-docs:
    path: /api-docs

  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method